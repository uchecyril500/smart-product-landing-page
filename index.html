<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Bottle</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: Arial;
}

/* HERO */
.hero {
    background: linear-gradient(to right, #198754, #20c997);
    color: white;
    padding: 100px 20px;
    text-align: center;
}

/* FEATURES */
.feature-box {
    padding: 15px;
    border-radius: 10px;
    transition: 0.3s;
}

.feature-box:hover {
    background: #f8f9fa;
}

/* IMAGE */
.product-img {
    transition: transform 0.4s;
}

.product-img:hover {
    transform: scale(1.1);
}

/* PRICE */
.price {
    font-size: 40px;
    font-weight: bold;
}

/* ANIMATION */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    transition: 0.6s;
}

.fade-in.show {
    opacity: 1;
    transform: translateY(0);
}
</style>

</head>
<body>

<!-- HERO -->
<section class="hero">
    <h1>Stay Hydrated. Stay Smart.</h1>
    <p>Track your hydration with our smart bottle</p>
    <button class="btn btn-light mt-3" onclick="showMessage()">Buy Now</button>
</section>

<!-- FEATURES -->
<section class="container py-5 text-center">
    <h2>Features</h2>
    <div class="row mt-4">
        <div class="col-md-3 fade-in"><div class="feature-box">Tracks intake</div></div>
        <div class="col-md-3 fade-in"><div class="feature-box">Mobile app</div></div>
        <div class="col-md-3 fade-in"><div class="feature-box">Long battery</div></div>
        <div class="col-md-3 fade-in"><div class="feature-box">Modern design</div></div>
    </div>
</section>

<!-- IMAGE -->
<section class="text-center p-4 fade-in">
    <img src="https://images.unsplash.com/photo-1602143407151-7111542de6e8" class="img-fluid product-img" width="300">
</section>

<!-- BENEFITS -->
<section class="bg-light p-5 text-center fade-in">
    <h2>Why Choose This Product?</h2>
    <p>Improve your daily hydration with smart tracking.</p>
</section>

<!-- PRICE -->
<section class="text-center p-5 fade-in">
    <div class="price">€29.99</div>
    <button class="btn btn-success mt-3" onclick="showMessage()">Order Now</button>
</section>

<script>
// Button alert
function showMessage() {
    alert("Order feature coming soon!");
}

// Scroll animation
const elements = document.querySelectorAll('.fade-in');

window.addEventListener('scroll', () => {
    elements.forEach(el => {
        const position = el.getBoundingClientRect().top;
        if (position < window.innerHeight - 50) {
            el.classList.add('show');
        }
    });
});
</script>

</body>
</html>
